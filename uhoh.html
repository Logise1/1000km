<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de carga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div
        class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center transition-transform hover:scale-105 duration-300">

        <div class="flex justify-center mb-6">
            <svg class="w-20 h-20 text-red-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>

        <h1 class="text-4xl font-extrabold text-gray-800 mb-4">Uh oh!</h1>
        <p class="text-lg text-gray-600 mb-8 leading-relaxed">
            Ha habido un problema al cargar este sitio web. Inténtalo más tarde.
        </p>

        <button onclick="window.location.reload()"
            class="bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-full w-full transition-colors duration-200 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-opacity-75">
            Volver a intentar
        </button>
    </div>

</body>

</html>
